# Home Assistant 配置示例：通过 Siri/HomePod 控制 hzr_mcp 设备
# 将需要的部分合并到你的 configuration.yaml，或按说明在「设置」-「设备与服务」里配置

# ---------- 方案一：HA 能执行 docker 时，用 command_line 开关 ----------
# 把下面的 switch 块合并到 configuration.yaml
# 注意：command_line 开关需要 HA 能执行 docker（例如挂载了 docker.sock）
# 请把 YOUR_HZR_MCP_CONTAINER 换成实际容器名，如 hzr_mcp

# switch:
#   - platform: command_line
#     switches:
#       jiashiqi:
#         command_on: "docker exec YOUR_HZR_MCP_CONTAINER python /app/xiaomi/jiashiqi/control.py on"
#         command_off: "docker exec YOUR_HZR_MCP_CONTAINER python /app/xiaomi/jiashiqi/control.py off"
#         command_state: "docker exec YOUR_HZR_MCP_CONTAINER python /app/xiaomi/jiashiqi/control.py status"
#         value_template: "{{ value == 'on' }}"
#         friendly_name: "加湿器"

# ---------- 方案二：通过 HTTP 桥接服务（bridge_server.py）----------
# 1. 在 NAS 上运行 bridge_server.py（见 README）
# 2. 在 HA 里添加 rest_command 和 template 开关

