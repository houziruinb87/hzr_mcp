# ---------- 暴露给 HomeKit（Siri）----------
# 在 HA 界面：设置 → 设备与服务 → HomeKit → 添加桥接 → 选择要暴露的实体
# 把上面创建的「加湿器」「乌龟灯」「走廊灯」「全屋灯」等开关加入 HomeKit，
# 然后在「家庭」App 里就能用 Siri 控制。

# 若用 YAML 配置 HomeKit 桥接，示例：
# homekit:
#   - name: HA桥接
#     filter:
#       include_entities:
#         - switch.jiashiqi
#         - switch.wuguideng
#         # ...
