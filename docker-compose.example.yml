# hzr_mcp：小智 MCP 长连接专用容器
# 代码来自 NAS 上 clone 的 GitLab 工程，每次容器启动/重启都会放弃本地改动并拉取最新代码后再启动长连接。
#
# 用法：
#   1. 在 NAS 上 clone 工程（若尚未 clone）：
#        git clone <你的 NAS GitLab hzr_mcp 地址> /path/to/data/hzr_mcp
#   2. 复制本文件并配置：
#        cp docker-compose.example.yml docker-compose.yml
#        cp .env.example .env   # 编辑 .env：MCP_BASE_URL、MCP_TOKEN
#   3. 在 clone 出来的目录（即与 docker-compose.yml 同目录）执行：
#        docker compose up -d
#
# 注意：当前目录会被挂载到容器的 /app，必须是 git 仓库，启动时会执行 git fetch + reset --hard origin/main
#
# adb：与 NAS 上 office 同机时挂载 office 的 tools（tools 下有 android-sdk、env.sh 等），
#       容器内 ADB_PATH 指向 /workspace/tools/android-sdk/platform-tools/adb。

services:
  hzr_mcp:
    build: .
    image: hzr_mcp:latest
    container_name: hzr_mcp
    restart: unless-stopped
    env_file: .env
    # 代码目录：当前目录（即 NAS 上 clone 的 hzr_mcp 工程）挂载到 /app，每次启动拉取最新后再跑
    volumes:
      - .:/app
      # 挂载 office 的 tools（.../docker/office/tools → 内有 android-sdk、env.sh 等）
      # 改为你的 NAS 上 office/tools 实际路径
      - /path/to/nas/docker/office/tools:/workspace/tools:ro
    environment:
      ADB_PATH: /workspace/tools/android-sdk/platform-tools/adb
      # 镜像内已装 OpenJDK 17；arm64 可覆盖 JAVA_HOME: /usr/lib/jvm/java-17-openjdk-arm64
    # 可选：指定拉取分支（默认 main）
    #   GIT_BRANCH: main
    # 若需覆盖 name_to_ip.json 等，可追加挂载：
    #   - /path/to/name_to_ip.json:/app/name_to_ip.json:ro
