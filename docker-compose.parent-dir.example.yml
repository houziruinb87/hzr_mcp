# 当你在「mcp」目录下放 clone 的 hzr_mcp（即 mcp/hzr_mcp/），并在 mcp 目录跑 compose 时使用本文件。
# 复制到「mcp」目录并改名为 docker-compose.yml，不要放在 hzr_mcp 子目录里。
#
# 目录结构示例：
#   mcp/
#     hzr_mcp/          <- git clone 的仓库
#     docker-compose.yml   <- 由本文件复制而来
#     .env
#
# 用法（在 mcp 目录下执行）：
#   cp hzr_mcp/docker-compose.parent-dir.example.yml docker-compose.yml
#   cp hzr_mcp/.env.example .env   # 编辑 .env 填 MCP_BASE_URL、MCP_TOKEN
#   docker compose up -d

services:
  hzr_mcp:
    build:
      context: ./hzr_mcp
      dockerfile: Dockerfile
    image: hzr_mcp:latest
    container_name: hzr_mcp
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./hzr_mcp:/app
    # environment:
    #   GIT_BRANCH: main
