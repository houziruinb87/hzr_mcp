# 当你在「mcp」目录下放 clone 的 hzr_mcp（即 mcp/hzr_mcp/），并在 mcp 目录跑 compose 时使用本文件。
# 复制到「mcp」目录并改名为 docker-compose.yml，不要放在 hzr_mcp 子目录里。
#
# 目录结构示例：
#   docker/mcp/
#     hzr_mcp/            <- git clone 的仓库
#     docker-compose.yml  <- 由本文件复制而来
#     .env
#
# 用法（在 mcp 目录下执行）：
#   cp hzr_mcp/docker-compose.parent-dir.example.yml docker-compose.yml
#   cp hzr_mcp/.env.example .env   # 编辑 .env 填 MCP_BASE_URL、MCP_TOKEN
#   docker compose up -d
#
# adb：挂载同机 office 的 tools（.../docker/office/tools），容器内用 ADB_PATH 指向 adb。
# GitLab 在宿主机 127.0.0.1:2222 时，需 network_mode: host，否则容器内 127.0.0.1 连不到主机；
# 同时挂载宿主机 .ssh 到 /root/.ssh:ro，供 entrypoint 内 git fetch 使用。

services:
  hzr_mcp:
    build:
      context: ./hzr_mcp
      dockerfile: Dockerfile
    image: hzr_mcp:latest
    container_name: hzr_mcp
    restart: unless-stopped
    network_mode: host
    env_file: .env
    volumes:
      - ./hzr_mcp:/app
      - /path/to/nas/docker/office/tools:/workspace/tools:ro
      # 供容器内 git fetch（GitLab 在主机 127.0.0.1:2222），按实际 .ssh 路径修改：
      # - /path/to/nas/.ssh:/root/.ssh:ro
    environment:
      ADB_PATH: /workspace/tools/android-sdk/platform-tools/adb
      # 镜像内已装 OpenJDK 17 并设 JAVA_HOME；若 NAS 为 arm64 可覆盖：
      # JAVA_HOME: /usr/lib/jvm/java-17-openjdk-arm64
    #   GIT_BRANCH: main
