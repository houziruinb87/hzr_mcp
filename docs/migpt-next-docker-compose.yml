# MiGPT-Next Docker Compose（与 config.js 同目录使用）
# 用法：在本目录下执行  docker compose up -d  启动，docker compose down  停止
# 国内若拉取失败可改用镜像：docker.1ms.run/idootop/migpt-next:latest

services:
  migpt-next:
    image: docker.1ms.run/idootop/migpt-next:latest
    container_name: migpt-next
    restart: unless-stopped
    volumes:
      - ./config.js:/app/config.js
