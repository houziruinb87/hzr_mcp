# 按官方 README 最简 Docker 部署：https://github.com/idootop/open-xiaoai/blob/main/examples/xiaozhi/README.md
# 用法：在本目录执行 docker compose up -d

services:
  open-xiaoai-xiaozhi:
    image: docker.1ms.run/idootop/open-xiaoai-xiaozhi:latest
    container_name: open-xiaoai-xiaozhi
    restart: unless-stopped
    environment:
      - CLI=true
      - PYTHONUNBUFFERED=1
    ports:
      - "4399:4399"
    volumes:
      - ./config.py:/app/config.py
