# Open-XiaoAI Server + oxa-server 增强（免唤醒 + 爸爸最帅 + bridge_server）
# 用法：放在与 config_oxa.py、oxa_ext 同级目录，执行 docker compose -f docker-compose-oxa.yml up -d

services:
  open-xiaoai-xiaozhi:
    image: docker.1ms.run/idootop/open-xiaoai-xiaozhi:latest
    container_name: open-xiaoai-xiaozhi
    restart: unless-stopped
    ports:
      - "4399:4399"
    volumes:
      - ./config_oxa.py:/app/config.py
      - ./oxa_ext:/app/oxa_ext
